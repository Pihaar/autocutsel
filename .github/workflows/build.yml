name: Build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  version:
    name: Check version consistency
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from configure.ac
        id: get
        run: |
          ver=$(sed -n 's/^AC_INIT(\[autocutsel\],\[\([^]]*\)\].*/\1/p' configure.ac)
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Version: $ver"

      - name: Verify packaging versions match
        run: |
          ver="${{ steps.get.outputs.version }}"
          fail=0
          check() {
            if [ "$2" != "$ver" ]; then
              echo "MISMATCH in $1: got '$2', expected '$ver'"
              fail=1
            else
              echo "OK: $1 = $2"
            fi
          }
          check "autocutsel.spec" "$(sed -n 's/^Version:[[:space:]]*//p' contrib/rpm/autocutsel.spec)"
          check "PKGBUILD" "$(sed -n 's/^pkgver=//p' contrib/arch/PKGBUILD)"
          check "debian/changelog" "$(head -1 debian/changelog | sed 's/.*(\(.*\)-.*/\1/')"
          exit $fail

  build-fedora:
    name: Build (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc make autoconf automake libtool file \
            libX11-devel libXt-devel libXmu-devel libXaw-devel libXext-devel \
            libinput-devel systemd-devel

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  build-opensuse:
    name: Build (openSUSE)
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    steps:
      - name: Install dependencies
        run: |
          zypper --non-interactive install \
            gcc make gawk autoconf automake libtool pkg-config file \
            libX11-devel libXt-devel libXmu-devel libXaw-devel libXext-devel \
            libinput-devel libudev-devel

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  build-ubuntu:
    name: Build (Ubuntu)
    runs-on: ubuntu-latest
    container: ubuntu:latest
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            gcc make autoconf automake libtool pkg-config \
            libx11-dev libxt-dev libxmu-dev libxaw7-dev libxext-dev \
            libinput-dev libudev-dev

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  build-debian:
    name: Build (Debian)
    runs-on: ubuntu-latest
    container: debian:stable
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            gcc make autoconf automake libtool pkg-config \
            libx11-dev libxt-dev libxmu-dev libxaw7-dev libxext-dev \
            libinput-dev libudev-dev

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  build-archlinux:
    name: Build (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            autoconf automake libtool pkg-config \
            libx11 libxt libxmu libxaw libxext \
            libinput systemd

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  sanitizers:
    name: Sanitizers (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc make autoconf automake libtool file \
            libX11-devel libXt-devel libXmu-devel libXaw-devel libXext-devel \
            libinput-devel systemd-devel libasan libubsan

      - uses: actions/checkout@v6

      - name: Bootstrap
        run: ./bootstrap

      - name: Configure (ASan + UBSan)
        run: ./configure CFLAGS="-g -fsanitize=address,undefined -fno-omit-frame-pointer" LDFLAGS="-fsanitize=address,undefined"

      - name: Build
        run: make

      - name: Test
        run: make check || { cat test-suite.log; exit 1; }

  rpm-fedora:
    name: RPM (Fedora)
    runs-on: ubuntu-latest
    container: fedora:latest
    needs: [version, build-fedora]
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc make autoconf automake libtool rpm-build \
            libX11-devel libXt-devel libXmu-devel libXaw-devel libXext-devel \
            libinput-devel systemd-devel

      - uses: actions/checkout@v6

      - name: Create source tarball
        run: |
          ver="${{ needs.version.outputs.version }}"
          topdir=$(rpm --eval '%{_topdir}')
          mkdir -p "$topdir/SOURCES"
          tar czf "$topdir/SOURCES/autocutsel-${ver}.tar.gz" \
            --transform "s,^,autocutsel-${ver}/," \
            --exclude=.git *

      - name: Build RPM
        run: rpmbuild -ba contrib/rpm/autocutsel.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: rpm-fedora
          path: ~/rpmbuild/RPMS/**/*.rpm

  rpm-opensuse:
    name: RPM (openSUSE)
    runs-on: ubuntu-latest
    container: opensuse/tumbleweed:latest
    needs: [version, build-opensuse]
    steps:
      - name: Install dependencies
        run: |
          zypper --non-interactive install \
            gcc make gawk autoconf automake libtool rpm-build pkg-config \
            libX11-devel libXt-devel libXmu-devel libXaw-devel libXext-devel \
            libinput-devel libudev-devel

      - uses: actions/checkout@v6

      - name: Create source tarball
        run: |
          ver="${{ needs.version.outputs.version }}"
          topdir=$(rpm --eval '%{_topdir}')
          mkdir -p "$topdir/SOURCES"
          tar czf "$topdir/SOURCES/autocutsel-${ver}.tar.gz" \
            --transform "s,^,autocutsel-${ver}/," \
            --exclude=.git *

      - name: Build RPM
        run: rpmbuild -ba contrib/rpm/autocutsel.spec

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: rpm-opensuse
          path: /usr/src/packages/RPMS/**/*.rpm

  deb-debian:
    name: DEB (Debian)
    runs-on: ubuntu-latest
    container: debian:stable
    needs: build-debian
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            gcc make autoconf automake libtool pkg-config \
            libx11-dev libxt-dev libxmu-dev libxaw7-dev libxext-dev \
            libinput-dev libudev-dev \
            debhelper fakeroot dpkg-dev

      - uses: actions/checkout@v6

      - name: Build DEB
        run: dpkg-buildpackage -us -uc -b

      - name: Collect DEB
        run: cp ../*.deb .

      - name: Upload DEB
        uses: actions/upload-artifact@v7
        with:
          name: deb-debian
          path: '*.deb'

  pkg-archlinux:
    name: PKG (Arch Linux)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    needs: [version, build-archlinux]
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm \
            autoconf automake libtool pkg-config \
            libx11 libxt libxmu libxaw libxext \
            libinput systemd git

      - name: Create build user
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers

      - uses: actions/checkout@v6

      - name: Create source tarball
        run: |
          ver="${{ needs.version.outputs.version }}"
          tar czf "autocutsel-${ver}.tar.gz" \
            --transform "s,^,autocutsel-${ver}/," \
            --exclude=.git *

      - name: Build package
        run: |
          cp contrib/arch/PKGBUILD .
          chown -R builder:builder .
          su builder -c 'makepkg -sf --noconfirm'

      - name: Upload PKG
        uses: actions/upload-artifact@v7
        with:
          name: pkg-archlinux
          path: '*.pkg.tar.zst'

  release:
    name: Upload release assets
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: [rpm-fedora, rpm-opensuse, deb-debian, pkg-archlinux]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v7

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          find . -type f \( -name '*.rpm' -o -name '*.deb' -o -name '*.pkg.tar.zst' \) \
            ! -name '*-debug*' ! -name '*-dbgsym*' ! -name '*.src.rpm' \
            -exec gh release upload "$tag" {} --repo "$GITHUB_REPOSITORY" --clobber \;
